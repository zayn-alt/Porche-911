name: Playwright Test

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install OpenVPN
        run: sudo apt-get install -y openvpn

      - name: Connect VPN
        run: |
          echo "vpnbook" > /tmp/vpn_creds.txt
          echo "6mdaywd" >> /tmp/vpn_creds.txt
          sudo openvpn --config vpnbook-us16-tcp443.ovpn --auth-user-pass /tmp/vpn_creds.txt --daemon
          sleep 10

      - name: Check IP
        run: curl https://api.ipify.org

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Install Xvfb
        run: sudo apt-get install -y xvfb

      - name: Run Playwright script with Xvfb
        run: xvfb-run --auto-servernum --server-args="-screen 0 1366x768x24" node test_playwright.js

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-screenshots
          path: screenshot_*.png
